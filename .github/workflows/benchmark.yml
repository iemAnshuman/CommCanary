name: Scheduled scale benchmark

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install the exact checkout
        run: python -m pip install --disable-pip-version-check .
      - name: Run functional smoke
        run: python -m benchmarks smoke --output .benchmark-data/smoke.json
      - name: Generate deterministic scale fixtures
        run: python -m benchmarks fixtures .benchmark-data/fixtures
      - name: Measure scalable operation families
        run: |
          python -m benchmarks run .benchmark-data/fixtures/manifest.json \
            --output .benchmark-data/scale.json \
            --repeats 3 \
            --operation load \
            --operation validate \
            --operation hash \
            --operation compile \
            --operation replay \
            --operation verify \
            --operation compare \
            --operation capture_merge \
            --operation param_export
      - name: Preserve observations without inventing a threshold
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: commcanary-scale-${{ github.run_id }}
          path: |
            .benchmark-data/fixtures/manifest.json
            .benchmark-data/smoke.json
            .benchmark-data/scale.json
          if-no-files-found: error
          retention-days: 90
          compression-level: 9
          overwrite: false
