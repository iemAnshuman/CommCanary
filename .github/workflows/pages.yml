name: Pages Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Install the project artifact
        run: python -m pip install --disable-pip-version-check .
      - name: Build demo site
        run: |
          mkdir -p site
          python -m commcanary compile examples/traces/llama70b_tp8_trace.json -o site/workload.canary.json
          python -m commcanary replay site/workload.canary.json -o site/baseline.report.json --html site/baseline.report.html --include-samples
          python -m commcanary replay site/workload.canary.json -o site/candidate.report.json --html site/candidate.report.html --latency-floor-us 12 --include-samples
          # compare exits 1 on the demo's intentional fail verdict; anything else is a real error
          python -m commcanary compare site/baseline.report.json site/candidate.report.json -o site/comparison.json --html site/comparison.html || [ "$?" -eq 1 ]
          test -s site/comparison.html
          cp docs/demo/index.html site/index.html
          cp -R schemas site/schemas
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
