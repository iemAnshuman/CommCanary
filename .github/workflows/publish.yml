name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Check out release source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project and canonical gate dependencies
        run: python -m pip install --disable-pip-version-check ".[dev]"
      - name: Verify release identity and build exact artifacts
        env:
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          version="${RELEASE_TAG#v}"
          test "$RELEASE_TAG" = "v$version"
          test -z "$RELEASE_NAME" || test "$RELEASE_NAME" = "$RELEASE_TAG"
          python -m tools.verify --release --artifact-dir dist --metadata-dir release-metadata --expected-version "$version"
      - name: Transfer the exact tested distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
          overwrite: false
      - name: Preserve checksums, content inventory, and SPDX SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-metadata
          path: release-metadata/
          if-no-files-found: error
          retention-days: 90
          overwrite: false

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/project/commcanary/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Retrieve the exact tested distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-distributions
          path: dist
      - name: Publish the tested artifacts
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          attestations: true
