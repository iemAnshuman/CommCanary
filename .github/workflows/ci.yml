name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
            gate-args: ""
          - os: ubuntu-latest
            python-version: "3.10"
            gate-args: ""
          - os: ubuntu-latest
            python-version: "3.11"
            gate-args: ""
          - os: ubuntu-latest
            python-version: "3.12"
            gate-args: --reproducible
          - os: ubuntu-latest
            python-version: "3.13"
            gate-args: ""
          - os: macos-latest
            python-version: "3.12"
            gate-args: ""
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project and canonical gate dependencies
        run: python -m pip install --disable-pip-version-check ".[dev]"
      - name: Run canonical verification gate
        run: python -m tools.verify ${{ matrix.gate-args }}
