name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
            gate-args: ""
          - os: ubuntu-latest
            python-version: "3.10"
            gate-args: ""
          - os: ubuntu-latest
            python-version: "3.11"
            gate-args: ""
          - os: ubuntu-latest
            python-version: "3.12"
            gate-args: --reproducible
          - os: ubuntu-latest
            python-version: "3.13"
            gate-args: ""
          - os: macos-latest
            python-version: "3.12"
            gate-args: ""
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project and canonical gate dependencies
        run: python -m pip install --disable-pip-version-check ".[dev]"
      - name: Run canonical verification gate
        run: python -m tools.verify ${{ matrix.gate-args }}
